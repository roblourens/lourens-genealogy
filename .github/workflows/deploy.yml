# Builds the static site and publishes it to GitHub Pages.
#
# One-time setup before this runs successfully:
#   1. Repo Settings → Pages → "Build and deployment" → Source: "GitHub Actions".
#   2. Repo Settings → Secrets and variables → Actions → New repository secret:
#        Name:  MAPBOX_TOKEN
#        Value: your pk.* token from .env.local
#   3. In your Mapbox account, restrict that token to the Pages URL
#      (https://<you>.github.io/<repo>/*) so it can't be reused elsewhere.
#
# BASE_PATH is derived from the repo name so a project site served at
# https://<you>.github.io/<repo>/ resolves its asset URLs correctly. If you
# later attach a custom domain or rename the repo to <you>.github.io, change
# BASE_PATH to "/".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build site
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
